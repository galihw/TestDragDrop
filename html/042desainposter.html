<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kendali Robot dengan Variabel dan Tipe Data</title>
	/*<link rel="apple-touch-icon" sizes="180x180" href="img/favicon_io/apple-touch-icon.png">*/
	/*<link rel="icon" type="image/png" sizes="32x32" href="img/favicon_io/favicon-32x32.png">*/
	/*<link rel="icon" type="image/png" sizes="16x16" href="img/favicon_io/favicon-16x16.png">*/
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
			position: absolute;
			background-color: #222222;
			background-size: 100%;
			user-select: none;
			-webkit-user-select: none;
		}
		.btn {
			position: absolute;
			cursor: pointer;
			touch-action: none;
			outline = none;
			width: 100px; 
			height: 50px; 
			background-color: #ff0000;
			opacity: 0.5;
			user-select: none;
			-webkit-user-select: none;
		}
		.myimg {
			position: absolute;
			cursor: pointer;
			touch-action: none;
			outline = none;
			width: 10px; 
			height: 10px; 
			/*background-color: #ff0000;*/
			/*opacity : 0.5;*/
			user-select: none;
			-webkit-user-select: none;
		}
	</style>
</head>
<body>
	
	<div class ="bg" id="bg">
		<div class="btn" id="btn"></div>
		<div class="myimg" id="shape1" style="width:225px;height:401px;background-image:url('../img/shape1.png');"></div>
	</div>
	<script>
		const myBG = document.getElementById('bg');
		const kotak = document.getElementById('btn');
		const shape1 = document.getElementById('shape1');
		let lebarJendela = window.innerWidth;
		let tinggiJendela = window.innerHeight;
		var scl = 1;
		function XYbenda(){
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			myBG.style.left = ''+(myBG.x)+'px';
			myBG.style.top = ''+(myBG.y)+'px';
			kotak.style.left = ''+(400)+'px';
			kotak.style.top = ''+(400)+'px';
			shape1.style.left = ''+(100)+'px';
			shape1.style.top = ''+(10)+'px';
		}
		
		XYbenda(); // mengatur posisi x dan y
		
		var selectedEl = null;
        function selectElement(el) {
            if (selectedEl) {
                selectedEl.classList.remove('selected-element');
            }
            selectedEl = el;
            selectedEl.classList.add('selected-element');
        }
		
		function setupDraggable(el,xmax,ymax) {
			console.log(xmax,ymax);
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;

            el.addEventListener('mousedown', dragMouseDown);
            el.addEventListener('touchstart', dragTouchStart, { passive: false });

            function dragMouseDown(e) {
                e.preventDefault();
                selectElement(el);
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.addEventListener('mouseup', closeDragElement);
                document.addEventListener('mousemove', elementDrag);
            }

            function dragTouchStart(e) {
                selectElement(el);
                const touch = e.touches[0];
                pos3 = touch.clientX;
                pos4 = touch.clientY;
                document.addEventListener('touchend', closeDragElement);
                document.addEventListener('touchmove', elementTouchDrag, { passive: false });
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;

                // Set positions and lock bounds inside poster page
                let newTop = el.offsetTop - pos2;
                let newLeft = el.offsetLeft - pos1;

                if (newLeft >= 0 && newLeft <= xmax) el.style.left = newLeft + "px";
                if (newTop >= 0 && newTop <= ymax) el.style.top = newTop + "px";
            }

            function elementTouchDrag(e) {
                e.preventDefault();
                const touch = e.touches[0];
                pos1 = pos3 - touch.clientX;
                pos2 = pos4 - touch.clientY;
                pos3 = touch.clientX;
                pos4 = touch.clientY;

                let newTop = el.offsetTop - pos2;
                let newLeft = el.offsetLeft - pos1;

                if (newLeft >= 0 && newLeft <= xmax) el.style.left = newLeft + "px";
                if (newTop >= 0 && newTop <= ymax) el.style.top = newTop + "px";
            }

            function closeDragElement() {
                document.removeEventListener('mouseup', closeDragElement);
                document.removeEventListener('mousemove', elementDrag);
                document.removeEventListener('touchend', closeDragElement);
                document.removeEventListener('touchmove', elementTouchDrag);
            }
        }
	</script>
	
	<script>
		// seleksi objek yang mau di drag
		setupDraggable(shape1,myBG.offsetWidth-shape1.offsetWidth,myBG.offsetHeight-shape1.offsetHeight);
		
	</script>
	<script>
		
		var fixzoom,fixscale;
		document.body.style.backgroundColor = "black";
		window.addEventListener('resize', () => {
			ZoomAll();
		});

		function UbahWindow(xc,yc){
			XYbenda();
		}
		function ZoomAll(){
			let lebarJendela = window.innerWidth;
			let tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixscale = scl;
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			UbahWindow(0,0);
		}
		
		ZoomAll();
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
			myBG.removeEventListener('click', handleClick);
		}, 100);
		
	</script>
</body>
</html>

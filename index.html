<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kendali Robot dengan Variabel dan Tipe Data</title>
	/*<link rel="apple-touch-icon" sizes="180x180" href="img/favicon_io/apple-touch-icon.png">*/
	/*<link rel="icon" type="image/png" sizes="32x32" href="img/favicon_io/favicon-32x32.png">*/
	/*<link rel="icon" type="image/png" sizes="16x16" href="img/favicon_io/favicon-16x16.png">*/
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
			position: absolute;
			background-color: #222222;
			background-size: 100%;
			user-select: none;
			-webkit-user-select: none;
		}
		.kotak {
			position: absolute;
			cursor: pointer;
			touch-action: none;
			outline = none;
			width: 100px; 
			height: 50px; 
			background-color: #ff0000;
			opacity: 0.5;
			user-select: none;
			-webkit-user-select: none;
		}
	</style>
</head>
<body>
	
	<div class ="bg" id="bg">
		<div class="kotak" id="kotak"></div>
	</div>
	<script>
		const myBG = document.getElementById('bg');
		const kotak = document.getElementById('kotak');
		let lebarJendela = window.innerWidth;
		let tinggiJendela = window.innerHeight;
		var scl = 1;
		myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
		myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
		myBG.style.left = ''+(myBG.x)+'px';
		myBG.style.top = ''+(myBG.y)+'px';
		
		var selectedEl = null;
        function selectElement(el) {
            if (selectedEl) {
                selectedEl.classList.remove('selected-element');
            }
            selectedEl = el;
            selectedEl.classList.add('selected-element');
/*
            // Open control panel
            document.getElementById('element-editor').classList.remove('hidden');
            document.getElementById('kanvas-tip-box').classList.add('hidden');

            const size = selectedEl.getAttribute('data-scale') || '100';
            document.getElementById('slider-size').value = size;
            document.getElementById('val-size').innerText = size + '%';

            // Show color options only if selected element is a Shape
            const type = selectedEl.getAttribute('data-type');
            if (type === 'shape') {
                document.getElementById('editor-color-group').classList.remove('hidden');
            } else {
                document.getElementById('editor-color-group').classList.add('hidden');
            }
			*/
        }
		
		function setupDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;

            el.addEventListener('mousedown', dragMouseDown);
            el.addEventListener('touchstart', dragTouchStart, { passive: false });

            function dragMouseDown(e) {
                e.preventDefault();
                selectElement(el);
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.addEventListener('mouseup', closeDragElement);
                document.addEventListener('mousemove', elementDrag);
            }

            function dragTouchStart(e) {
                selectElement(el);
                const touch = e.touches[0];
                pos3 = touch.clientX;
                pos4 = touch.clientY;
                document.addEventListener('touchend', closeDragElement);
                document.addEventListener('touchmove', elementTouchDrag, { passive: false });
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;

                // Set positions and lock bounds inside poster page
                let newTop = el.offsetTop - pos2;
                let newLeft = el.offsetLeft - pos1;

                if (newTop >= 0 && newTop <= 350) el.style.top = newTop + "px";
                if (newLeft >= -20 && newLeft <= 240) el.style.left = newLeft + "px";
            }

            function elementTouchDrag(e) {
                e.preventDefault();
                const touch = e.touches[0];
                pos1 = pos3 - touch.clientX;
                pos2 = pos4 - touch.clientY;
                pos3 = touch.clientX;
                pos4 = touch.clientY;

                let newTop = el.offsetTop - pos2;
                let newLeft = el.offsetLeft - pos1;

                if (newTop >= 0 && newTop <= 350) el.style.top = newTop + "px";
                if (newLeft >= -20 && newLeft <= 240) el.style.left = newLeft + "px";
            }

            function closeDragElement() {
                document.removeEventListener('mouseup', closeDragElement);
                document.removeEventListener('mousemove', elementDrag);
                document.removeEventListener('touchend', closeDragElement);
                document.removeEventListener('touchmove', elementTouchDrag);
            }
        }
	</script>
	
	<script>
        setupDraggable(kotak);
	</script>
	<script>
		
		var fixzoom,fixscale;
		document.body.style.backgroundColor = "black";
		window.addEventListener('resize', () => {
			ZoomAll();
		});

		function UbahWindow(xc,yc){
			lebarJendela = window.innerWidth;
			tinggiJendela = window.innerHeight;
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			myBG.style.left = ''+(myBG.x)+'px';
			myBG.style.top = ''+(myBG.y)+'px';
		}
		function ZoomAll(){
			let lebarJendela = window.innerWidth;
			let tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixscale = scl;
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			UbahWindow(0,0);
		}
		
		ZoomAll();
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
			myBG.removeEventListener('click', handleClick);
		}, 100);
		
	</script>
</body>
</html>

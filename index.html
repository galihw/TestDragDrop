<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geser Dan Jatuhkan</title>
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
			position: absolute;
			background-color: #222222;
			background-size: 100%;
			user-select: none;
			-webkit-user-select: none;
		}
		.btn {
			position: absolute;
			cursor: pointer;
			touch-action: none;
			outline = none;
			width: 50px; 
			height: 50px; 
			background-color: #00ff00;
			/*opacity: 0.5;*/
			user-select: none;
			-webkit-user-select: none;
		}
		.terseleksi {
			box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
			user-select: none;
			-webkit-user-select: none;
		}
		.dropbenar {
			box-shadow: inset 0 0 20px 5px #ffff00;
			user-select: none;
			-webkit-user-select: none;
		}
		.areaDrop {
			position: absolute;
			cursor: default;
			touch-action: none;
			outline = none;
			width: 100px; 
			height: 100px; 
			background-color: #0000ff;
			/*opacity: 0.5;*/
			user-select: none;
			-webkit-user-select: none;
		}
		.garisH {
			position: absolute;
			width: 100%; 
			height: 1px; 
			background-color: #0000ff;
			user-select: none;
			-webkit-user-select: none;
		}
		.garisV {
			position: absolute;
			width: 1px;
			height: 100%;
			background-color: #0000ff;
			user-select: none;
			-webkit-user-select: none;
		}
	</style>
</head>
<body>
	
	<div class ="bg" id="bg">
		<div class="areaDrop" id="areaDrop"></div>
		<div class="btn" id="btn"></div>
	</div>
	<script>
		const myBG = document.getElementById('bg');
		const btn = document.getElementById('btn');
		const areaDrop = document.getElementById('areaDrop');
		bg.style.backgroundImage = "url(bg.png)";
		let lebarJendela = window.innerWidth;
		let tinggiJendela = window.innerHeight;
		var scl = 1;
		myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
		myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
		myBG.style.left = ''+(myBG.x)+'px';
		myBG.style.top = ''+(myBG.y)+'px';
		var scl = 1;
		btn.x = 0; btn.y = 0; btn.w = btn.offsetWidth; btn.h = btn.offsetHeight;
		areaDrop.x = 200; areaDrop.y = 200; areaDrop.w = areaDrop.offsetWidth; areaDrop.h = areaDrop.offsetHeight;
		function XYbenda(){
			lebarJendela = window.innerWidth;
			tinggiJendela = window.innerHeight;
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			myBG.style.left = ''+(myBG.x)+'px';
			myBG.style.top = ''+(myBG.y)+'px';
			btn.style.left = ''+(btn.x)+'px';
			btn.style.top = ''+(btn.y)+'px';
			areaDrop.style.left = ''+(areaDrop.x)+'px';
			areaDrop.style.top = ''+(areaDrop.y)+'px';
		}
		
		XYbenda(); // mengatur posisi x dan y
		
	</script>
	<script>
		var selectedEl = null;
        function selectElement(el) {
            UnselectElement(el)
            selectedEl = el;
            selectedEl.classList.add('terseleksi');
        }
        function UnselectElement(el) {
            if (selectedEl) {
                selectedEl.classList.remove('terseleksi');
                selectedEl.classList.remove('dropbenar');
				selectedEl = null;
            }
        }
		function setupDraggable(el,mc,mcdrop) {
			var xmax = (mc.offsetWidth-el.offsetWidth);
			var ymax = (mc.offsetHeight-el.offsetHeight);
			var xmin = 0;
			var ymin = 0;
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
			let startX=0, startY=0, initialX=0, initialY=0;
			let newX=0, newY=0;

            el.addEventListener('mousedown', dragMouseDown);
            el.addEventListener('touchstart', dragMouseDown, { passive: false });
			
			var ff = false;
            function dragMouseDown(e) {
                e.preventDefault();
                selectElement(el);
				if(e.type==="touchstart"){
					startX = e.targetTouches[0].clientX;
					startY = e.targetTouches[0].clientY;
					initialX = el.offsetLeft;
					initialY = el.offsetTop;
					document.addEventListener('touchend', dragMouseUp);
					document.addEventListener('touchmove', dragMouseMove, { passive: false });
				}else{
					startX = e.clientX;
					startY = e.clientY;
					initialX = el.offsetLeft;
					initialY = el.offsetTop;
					document.addEventListener('mouseup', dragMouseUp);
					document.addEventListener('mousemove', dragMouseMove);
				}
            }

            function dragMouseMove(e) {
                e.preventDefault();
				let deltaX=0;
				let deltaY=0;
				if(e.type==="touchstart"){
					deltaX = (e.targetTouches[0].clientX - startX) / scl;
					deltaY = (e.targetTouches[0].clientY - startY) / scl;
				}else{
					deltaX = (e.clientX - startX) / scl;
					deltaY = (e.clientY - startY) / scl;
				}
				newX = initialX + deltaX;
				newY = initialY + deltaY;
				newX = Math.max(xmin,Math.min(xmax,newX));
				newY = Math.max(ymin,Math.min(ymax,newY));
				el.x = newX;
				el.y = newY;
				el.style.left = newX + "px";
				el.style.top = newY + "px";
				ff = newX >= mcdrop.x-el.w/2 &&	newX <= mcdrop.x+mcdrop.w-el.w/2 && newY >= mcdrop.y-el.h/2 && newY <= mcdrop.y+mcdrop.h-el.h/2;
				if(ff){
					el.classList.remove('terseleksi');
					el.classList.add('dropbenar');
				}else{
					el.classList.add('terseleksi');
					el.classList.remove('dropbenar');
				}
            }
			
            function dragMouseUp() {
                document.removeEventListener('mouseup', dragMouseUp);
                document.removeEventListener('mousemove', dragMouseMove);
                document.removeEventListener('touchend', dragMouseUp);
                document.removeEventListener('touchmove', dragMouseMove);
				CekDrop();
				UnselectElement(el);
            }
			function CekDrop() {
				XYbenda();
				if(ff && selectedEl){
					console.log("benar");
				}
				
			}
        }
	</script>
	
	<script>
		// seleksi objek yang mau di drag
		//setupDraggable(namaobj,namaBG);
		setupDraggable(btn,myBG,areaDrop);
	</script>
	<script>
		
		var fixzoom,fixscale;
		document.body.style.backgroundColor = "black";
		window.addEventListener('resize', () => {
			ZoomAll();
		});

		function UbahWindow(){
			XYbenda();
			setupDraggable(btn,myBG,areaDrop);
		}
		function ZoomAll(){
			lebarJendela = window.innerWidth;
			tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixscale = scl;
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			UbahWindow();
		}
		
		ZoomAll();
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
			myBG.removeEventListener('click', handleClick);
		}, 100);
		
	</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geser Dan Jatuhkan</title>
	<style>
		.bg {
			max-width: 840px; /* Lebar maksimal halaman */
			margin: 0 auto;
			width: 100%;
			height: 472px;
			position: absolute;
			background-color: #222222;
			background-size: 100%;
			user-select: none;
			-webkit-user-select: none;
		}
		.btn {
			position: absolute;
			cursor: pointer;
			touch-action: none;
			outline = none;
			width: 50px; 
			height: 50px; 
			background-color: #00ff00;
			/*opacity: 0.5;*/
			user-select: none;
			-webkit-user-select: none;
		}
		.terseleksi {
			box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
			user-select: none;
			-webkit-user-select: none;
		}
		.dropbenar {
			box-shadow: inset 0 0 20px 5px #ffff00;
			user-select: none;
			-webkit-user-select: none;
		}
		.areaDrop {
			position: absolute;
			cursor: default;
			touch-action: none;
			outline = none;
			width: 100px; 
			height: 100px; 
			background-color: #0000ff;
			/*opacity: 0.5;*/
			user-select: none;
			-webkit-user-select: none;
		}
		.garisH {
			position: absolute;
			width: 100%; 
			height: 1px; 
			background-color: #0000ff;
			user-select: none;
			-webkit-user-select: none;
		}
		.garisV {
			position: absolute;
			width: 1px;
			height: 100%;
			background-color: #0000ff;
			user-select: none;
			-webkit-user-select: none;
		}
	</style>
</head>
<body>
	
	<div class ="bg" id="bg">
		<div class="garisH" id="garisH1"></div>
		<div class="garisH" id="garisH2"></div>
		<div class="garisV" id="garisV1"></div>
		<div class="garisV" id="garisV2"></div>
		<div class="areaDrop" id="areaDrop"></div>
		<div class="btn" id="btn"></div>
	</div>
	<script>
		const myBG = document.getElementById('bg');
		const btn = document.getElementById('btn');
		const areaDrop = document.getElementById('areaDrop');
		const garisH1 = document.getElementById('garisH1');
		const garisH2 = document.getElementById('garisH2');
		const garisV1 = document.getElementById('garisV1');
		const garisV2 = document.getElementById('garisV2');
		bg.style.backgroundImage = "url(bg.png)";
		let lebarJendela = window.innerWidth;
		let tinggiJendela = window.innerHeight;
		var scl = 1;
		myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
		myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
		myBG.style.left = ''+(myBG.x)+'px';
		myBG.style.top = ''+(myBG.y)+'px';
		var scl = 1;
		btn.x = 0; btn.y = 0; btn.w = btn.offsetWidth; btn.h = btn.offsetHeight;
		areaDrop.x = 200; areaDrop.y = 200; areaDrop.w = areaDrop.offsetWidth; areaDrop.h = areaDrop.offsetHeight;
		garisH1.x = 0; garisH1.y = 200;
		garisH1.x = 0; garisH2.y = 300;
		garisV1.x = 200; garisV1.y = 0;
		garisV2.x = 300; garisV2.y = 0;
		function XYbenda(){
			lebarJendela = window.innerWidth;
			tinggiJendela = window.innerHeight;
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			myBG.style.left = ''+(myBG.x)+'px';
			myBG.style.top = ''+(myBG.y)+'px';
			btn.style.left = ''+(btn.x)+'px';
			btn.style.top = ''+(btn.y)+'px';
			areaDrop.style.left = ''+(areaDrop.x)+'px';
			areaDrop.style.top = ''+(areaDrop.y)+'px';
			
			garisV1.x = areaDrop.x;
			garisV1.y = 0;
			garisV2.x = areaDrop.x+areaDrop.w;
			garisV1.y = 0;
			garisH1.x = 0;
			garisH1.y = areaDrop.y;
			garisH2.x = 0;
			garisH2.y = areaDrop.y+areaDrop.h;
			
			
			garisH1.style.left = ''+(garisH1.x)+'px';
			garisH1.style.top = ''+(garisH1.y)+'px';
			garisH2.style.left = ''+(garisH2.x)+'px';
			garisH2.style.top = ''+(garisH2.y)+'px';
			garisV1.style.left = ''+(garisV1.x)+'px';
			garisV1.style.top = ''+(garisV1.y)+'px';
			garisV2.style.left = ''+(garisV2.x)+'px';
			garisV2.style.top = ''+(garisV2.y)+'px';
		}
		
		XYbenda(); // mengatur posisi x dan y
		
	</script>
	<script>
		var selectedEl = null;
        function selectElement(el) {
            UnselectElement(el)
            selectedEl = el;
            selectedEl.classList.add('terseleksi');
        }
        function UnselectElement(el) {
            if (selectedEl) {
                selectedEl.classList.remove('terseleksi');
                selectedEl.classList.remove('dropbenar');
				selectedEl = null;
            }

		function setupDraggable(el,mc) {
			var xmax = (mc.offsetWidth-el.offsetWidth);
			var ymax = (mc.offsetHeight-el.offsetHeight);
			var xmin = 0;
			var ymin = 0;
			console.log(xmin,xmax,ymin,ymax);
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
			let startX=0, startY=0, initialX=0, initialY=0;
			let newX=0, newY=0;

            el.addEventListener('mousedown', dragMouseDown);
            el.addEventListener('touchstart', dragTouchStart, { passive: false });
			var ff = false;
            function dragMouseDown(e) {
                e.preventDefault();
                selectElement(el);
				startX = e.clientX;
				startY = e.clientY;
				initialX = el.offsetLeft;
				initialY = el.offsetTop;
                document.addEventListener('mouseup', closeDragElement);
                document.addEventListener('mousemove', elementDrag);
            }

            function dragTouchStart(e) {
                selectElement(el);
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
				initialX = el.offsetLeft;
				initialY = el.offsetTop;
                document.addEventListener('touchend', closeDragElement);
                document.addEventListener('touchmove', elementTouchDrag, { passive: false });
            }

            function elementDrag(e) {
                e.preventDefault();
				let deltaX = (e.clientX - startX) / scl;
				let deltaY = (e.clientY - startY) / scl;
				newX = initialX + deltaX;
				newY = initialY + deltaY;
				newX = Math.max(xmin,Math.min(xmax,newX));
				newY = Math.max(ymin,Math.min(ymax,newY));
				btn.x = newX;
				btn.y = newY;
				el.style.left = newX + "px";
				el.style.top = newY + "px";
				ff = newX >= areaDrop.x-el.w/2 &&	newX <= areaDrop.x+areaDrop.w-el.w/2 && newY >= areaDrop.y-el.h/2 && newY <= areaDrop.y+areaDrop.h-el.h/2;
				if(ff){
					el.classList.remove('terseleksi');
					el.classList.add('dropbenar');
				}else{
					el.classList.add('terseleksi');
					el.classList.remove('dropbenar');
				}
            }

            function elementTouchDrag(e) {
                e.preventDefault();
				let deltaX = (e.touches[0].clientX - startX) / scl;
				let deltaY = (e.touches[0].clientY - startY) / scl;
				newX = initialX + deltaX;
				newY = initialY + deltaY;
				newX = Math.max(xmin,Math.min(xmax,newX));
				newY = Math.max(ymin,Math.min(ymax,newY));
				btn.x = newX;
				btn.y = newY;
				el.style.left = newX + "px";
				el.style.top = newY + "px";
				ff = newX >= areaDrop.x-el.w/2 &&	newX <= areaDrop.x+areaDrop.w-el.w/2 && newY >= areaDrop.y-el.h/2 && newY <= areaDrop.y+areaDrop.h-el.h/2;
				if(ff){
					el.classList.remove('terseleksi');
					el.classList.add('dropbenar');
				}else{
					el.classList.add('terseleksi');
					el.classList.remove('dropbenar');
				}
            }

            function closeDragElement() {
                document.removeEventListener('mouseup', closeDragElement);
                document.removeEventListener('mousemove', elementDrag);
                document.removeEventListener('touchend', closeDragElement);
                document.removeEventListener('touchmove', elementTouchDrag);

				UnselectElement(el);

				if(ff){
					el.classList.remove('terseleksi');
					el.classList.add('dropbenar');
				}
				
			}
        }
	</script>
